name: portal_data
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  adaptive_theme: ^3.7.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  http: ^1.5.0
  package_info_plus: ^9.0.0
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.12.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: false
  image_path: "lib/src/assets/icon/icon.png"
  min_sdk_android: 21
